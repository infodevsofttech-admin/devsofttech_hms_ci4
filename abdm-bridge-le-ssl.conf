<VirtualHost *:443>
    ServerName abdm-bridge.e-atria.in
    ServerAlias www.abdm-bridge.e-atria.in
    ServerAdmin admin@e-atria.in

    DocumentRoot /var/www/html/abdm-bridge-gateway/public

    # Enable rewrite engine globally
    RewriteEngine On

    # Directory configuration - CRITICAL for .htaccess and rewrite rules
    <Directory /var/www/html/abdm-bridge-gateway/public>
        Options +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # DirectoryIndex for CodeIgniter
        DirectoryIndex index.php index.html index.htm
        
        # CodeIgniter routing: send all requests to index.php
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            
            # Don't rewrite existing files
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            
            # Route all requests to index.php
            RewriteRule ^(.*)$ index.php/$1 [L]
        </IfModule>
    </Directory>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/abdm-bridge-https-error.log
    CustomLog ${APACHE_LOG_DIR}/abdm-bridge-https-access.log combined

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/abdm-bridge.e-atria.in/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/abdm-bridge.e-atria.in/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
