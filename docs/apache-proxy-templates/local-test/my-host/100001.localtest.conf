# Local machine Apache config for pre-production testing
# Purpose: test callback flow locally by forwarding to CI4 dev server (php spark serve)
# Place on local Apache host and adapt paths/ports for your OS.

<VirtualHost *:80>
    ServerName 100001.localtest

    ProxyRequests Off
    ProxyPreserveHost On

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader append X-Forwarded-For %{REMOTE_ADDR}s

    ProxyTimeout 60
    Timeout 60

    # Keep same route shape as production, but target local spark server.
    ProxyPass        /healthplix/fetch http://localhost:8080/healthplix/fetch
    ProxyPassReverse /healthplix/fetch http://localhost:8080/healthplix/fetch

    ErrorLog  logs/100001-localtest-error.log
    CustomLog logs/100001-localtest-access.log combined
</VirtualHost>
